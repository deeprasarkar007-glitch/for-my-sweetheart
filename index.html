<body>

    <div id="player" style="position:absolute; top:-9999px; left:-9999px;"></div>

    <div id="gift-stage" onclick="openSurprise()">
        <div class="box"></div>
        <p style="letter-spacing: 2px; color: #ff75a0;">TAP TO OPEN YOUR GIFT</p>
    </div>

    <div id="main-content">
        <h1>HAPPY BIRTHDAY!</h1>
        <div class="sweetheart-line">Happy Birthday, Sweetheart <span class="heart">❤️</span></div>
        <p>You make every day feel like a celebration.</p>
        <button class="btn-celebrate" onclick="extraConfetti()">TAP FOR MAGIC ✨</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
        // Load YouTube API
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '0',
                width: '0',
                videoId: '9K_v5V8zH_M', // This is a soft Happy Birthday Lo-fi track
                events: {
                    'onReady': onPlayerReady
                }
            });
        }

        function onPlayerReady(event) {
            // Player is ready but won't play until click
        }

        function openSurprise() {
            // Start YouTube Audio
            if (player && player.playVideo) {
                player.playVideo();
            }

            document.getElementById('gift-stage').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            
            // Confetti Cannon
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#ff75a0', '#ffd700', '#ffffff']
            });
        }

        function extraConfetti() {
            confetti({ particleCount: 80, spread: 100, origin: { y: 0.6 } });
        }
    </script>
</body>
