<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Sweetheart</title>
    <style>
        body { margin: 0; background: #1a1a2e; color: white; font-family: 'Arial', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; text-align: center; overflow: hidden; }
        #gift-stage { cursor: pointer; }
        .box { width: 140px; height: 140px; background: #ff7597; margin: 20px auto; border-radius: 10px; position: relative; box-shadow: 0 0 40px rgba(255, 117, 151, 0.6); animation: bounce 1.5s infinite; }
        .box::after { content: ''; position: absolute; width: 25px; height: 100%; background: #ffd700; left: 50%; transform: translateX(-50%); }
        #main-content { display: none; }
        h1 { font-size: 3rem; color: #ff7597; text-shadow: 0 0 15px rgba(255, 117, 151, 0.5); margin: 10px 0; }
        .sweetheart-line { font-size: 1.8rem; margin: 15px 0; font-style: italic; color: #fceef5; }
        .btn-celebrate { background: #ff7597; border: none; color: white; padding: 12px 25px; border-radius: 50px; cursor: pointer; font-weight: bold; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
    </style>
</head>
<body>

    <div id="gift-stage" onclick="openSurprise()">
        <p style="color: #ff7597; font-weight: bold; letter-spacing: 2px;">TAP TO OPEN YOUR GIFT</p>
        <div class="box"></div>
    </div>

    <div id="main-content">
        <h1>HAPPY BIRTHDAY!</h1>
        <div class="sweetheart-line">Happy Birthday, Sweetheart ❤️</div>
        <p>You make every day brighter.</p>
        <button class="btn-celebrate" onclick="playBirthdayMelody()">REPLAY SONG 🎵</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
        const notes = [
            {f: 261.63, d: 0.4}, {f: 261.63, d: 0.2}, {f: 293.66, d: 0.6}, {f: 261.63, d: 0.6}, {f: 349.23, d: 0.6}, {f: 329.63, d: 1.2},
            {f: 261.63, d: 0.4}, {f: 261.63, d: 0.2}, {f: 293.66, d: 0.6}, {f: 261.63, d: 0.6}, {f: 392.00, d: 0.6}, {f: 349.23, d: 1.2},
            {f: 261.63, d: 0.4}, {f: 261.63, d: 0.2}, {f: 523.25, d: 0.6}, {f: 440.00, d: 0.6}, {f: 349.23, d: 0.4}, {f: 329.63, d: 0.4}, {f: 293.66, d: 0.6},
            {f: 466.16, d: 0.4}, {f: 466.16, d: 0.2}, {f: 440.00, d: 0.6}, {f: 349.23, d: 0.6}, {f: 392.00, d: 0.6}, {f: 349.23, d: 1.2}
        ];

        function playNote(freq, duration, startTime, audioCtx) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle'; // Softer, more "music-like" sound than 'sine'
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.1, startTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(startTime);
            osc.stop(startTime + duration);
        }

        function playBirthdayMelody() {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            let time = audioCtx.currentTime;
            notes.forEach(note => {
                playNote(note.f, note.d, time, audioCtx);
                time += note.d;
            });
        }

        function openSurprise() {
            playBirthdayMelody();
            document.getElementById('gift-stage').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 }, colors: ['#ff7597', '#ffd700', '#ffffff'] });
        }
    </script>
</body>
</html>
