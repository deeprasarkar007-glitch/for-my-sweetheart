<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Sweetheart</title>
    <style>
        body { margin: 0; background: #1a1a2e; color: white; font-family: 'Arial', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; text-align: center; overflow: hidden; }
        #gift-stage { cursor: pointer; }
        .box { width: 140px; height: 140px; background: #ff7597; margin: 20px auto; border-radius: 10px; position: relative; box-shadow: 0 0 30px rgba(255, 117, 151, 0.5); animation: bounce 1.5s infinite; }
        .box::after { content: ''; position: absolute; width: 25px; height: 100%; background: #ffd700; left: 50%; transform: translateX(-50%); }
        #main-content { display: none; }
        h1 { font-size: 3rem; color: #ff7597; margin: 10px 0; }
        .sweetheart-line { font-size: 1.6rem; margin: 15px 0; font-style: italic; }
        .btn-celebrate { background: #ff7597; border: none; color: white; padding: 12px 25px; border-radius: 50px; cursor: pointer; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
    </style>
</head>
<body>

    <div id="gift-stage" onclick="openSurprise()">
        <p style="color: #ff7597; font-weight: bold; letter-spacing: 2px;">TAP TO OPEN YOUR GIFT</p>
        <div class="box"></div>
    </div>

    <div id="main-content">
        <h1>HAPPY BIRTHDAY!</h1>
        <div class="sweetheart-line">Happy Birthday, Sweetheart ❤️</div>
        <button class="btn-celebrate" onclick="playChime()">TAP FOR MORE MAGIC ✨</button>
        <p style="margin-top:20px; font-size:0.8rem; opacity:0.5;">(Check your media volume!)</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
        // This creates sound from scratch using your computer's hardware
        function playChime() {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5 note
            oscillator.frequency.exponentialRampToValueAtTime(1046.50, audioCtx.currentTime + 0.5); // Slide to C6
            
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 1);

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 1);
            
            // Confetti
            confetti({ particleCount: 50, spread: 60 });
        }

        function openSurprise() {
            // Trigger the hardware sound
            playChime();

            document.getElementById('gift-stage').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';

            confetti({
                particleCount: 200,
                spread: 100,
                origin: { y: 0.6 },
                colors: ['#ff7597', '#ffd700', '#ffffff']
            });
        }
    </script>
</body>
</html>
